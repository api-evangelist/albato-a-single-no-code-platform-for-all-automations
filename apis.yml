    title: Workflow Automation Capability
  - type: Features
    data:
      - name: No-Code Automation Builder
        description: >-
          Visual drag-and-drop automation builder for creating multi-step
          workflows connecting 1,000+ apps without writing code.
      - name: Multi-Step Workflows
        description: >-
          Support for complex automations with conditions, delays, data
          transformations, and multiple sequential actions.
      - name: 1,000+ App Integrations
        description: >-
          Pre-built connectors for popular apps including HubSpot, Salesforce,
          Google Workspace, Slack, Shopify, and hundreds more.
      - name: Embedded iPaaS
        description: >-
          White-label integration platform for SaaS companies to embed
          Albato's automation capabilities natively in their products.
      - name: Webhook Support
        description: >-
          Inbound webhooks for real-time event processing, plus webhook
          subscription management for supported apps.
      - name: OAuth and API Key Authentication
        description: >-
          Support for all major authentication methods including OAuth 2.0,
          API key, basic auth, session auth, and custom auth flows.
      - name: Execution Monitoring
        description: >-
          Detailed execution history with success/error rates, step-level
          logging, and real-time notifications for failed automations.
      - name: App Integrator
        description: >-
          Custom connector builder allowing users to create API connectors
          from any REST API without development handoff.
  - type: UseCases
    data:
      - name: CRM and Marketing Automation
        description: >-
          Sync leads between CRM systems and marketing tools, automate
          follow-up sequences, and route prospects based on custom conditions.
      - name: E-Commerce Order Processing
        description: >-
          Automate order notifications, inventory updates, shipping tracking,
          and customer communication across e-commerce platforms.
      - name: SaaS Native Integrations
        description: >-
          Embed Albato's integration platform in SaaS products to offer
          customers white-labeled native integrations without in-house development.
      - name: Data Synchronization
        description: >-
          Keep data in sync across databases, spreadsheets, and business
          applications with scheduled and event-driven automations.
      - name: Customer Support Automation
        description: >-
          Route support tickets, trigger notifications, and sync customer
          data between helpdesk, CRM, and communication tools.
  - type: Integrations
    data:
      - name: HubSpot
        description: CRM and marketing automation integration for lead and contact management.
      - name: Salesforce
        description: Enterprise CRM integration for sales pipeline and customer data workflows.
      - name: Google Workspace
        description: >-
          Suite of Google app integrations including Sheets, Drive, Gmail,
          Calendar, and Forms.
      - name: Slack
        description: Team messaging integration for notifications and workflow alerts.
      - name: Shopify
        description: E-commerce integration for order, product, and customer automation.
